<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Tools - ICT With Kathurusingha</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</head>
<body>

<header>
    <h1>Student Study Tools</h1>
</header>

<div class="container">

    <!-- ===== Study Hours Tracker ===== -->
    <h2>Daily Study Hours Tracker</h2>

    <input id="hoursinput" placeholder="Enter Study Hours">
    <button onclick="addHours()">Add Hours</button>

    <div class="graphbox">
        <canvas id="hoursChart"></canvas>
    </div>

    <!-- ===== Personal Notes ===== -->
    <h2>Personal Notes</h2>
    <textarea placeholder="Write your notes"></textarea>

    <!-- ===== Personal Time Table ===== -->
    <h2>Personal Time Table</h2>
    <textarea placeholder="Write your timetable"></textarea>

</div>

</body>
</html>
